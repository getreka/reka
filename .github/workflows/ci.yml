name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rag-api:
    name: RAG API - Lint, Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: rag-api/package-lock.json
      - run: npm ci
        working-directory: rag-api
      - run: npx tsc --noEmit
        working-directory: rag-api
        name: Type check
      - run: npm run build
        working-directory: rag-api
      - run: npm test
        working-directory: rag-api
      - run: npm audit --audit-level=high || true
        working-directory: rag-api
        name: Security audit

  mcp-server:
    name: MCP Server - Lint, Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json
      - run: npm ci
        working-directory: mcp-server
      - run: npx tsc --noEmit
        working-directory: mcp-server
        name: Type check
      - run: npm run build
        working-directory: mcp-server
      - run: npm test
        working-directory: mcp-server
      - run: npm audit --audit-level=high || true
        working-directory: mcp-server
        name: Security audit

  dashboard:
    name: Dashboard - Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
        working-directory: dashboard
      - run: npm run build
        working-directory: dashboard

  docker:
    name: Docker - Build Images
    runs-on: ubuntu-latest
    needs: [rag-api, mcp-server, dashboard]
    steps:
      - uses: actions/checkout@v4
      - name: Build RAG API image
        run: docker build -t reka/rag-api:ci ./rag-api
      - name: Build Dashboard image
        run: docker build -t reka/dashboard:ci ./dashboard
