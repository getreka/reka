# Reka Platform — Docker Compose
# Shared infrastructure for RAG, LLM, and vector search

services:
  # ── Core Infrastructure (shared) ──────────────────────────

  qdrant:
    image: qdrant/qdrant:v1.15.2
    container_name: reka-qdrant
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: reka-ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_DEBUG=INFO
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_FLASH_ATTENTION=true
      - OLLAMA_CONTEXT_LENGTH=4096
      - OLLAMA_KEEP_ALIVE=-1
    deploy:
      resources:
        limits:
          memory: 24G
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/11434'"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: reka-redis
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy noeviction
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Reka Platform Services ────────────────────────────────

  rag-api:
    build:
      context: ../rag-api
      dockerfile: Dockerfile
    container_name: reka-api
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - api_data:/app/data
    environment:
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
      - REDIS_URL=redis://redis:6379
      - EMBEDDING_PROVIDER=ollama
      - OLLAMA_EMBEDDING_MODEL=qwen3-embedding:4b
      - VECTOR_SIZE=2560
      - LLM_PROVIDER=ollama
      - OLLAMA_MODEL=qwen3.5:9b
      - API_PORT=3100
      - API_HOST=0.0.0.0
      - CORS_ORIGIN=http://localhost:3000,http://dashboard:3000
      - NODE_OPTIONS=--max-old-space-size=2048
      - RATE_LIMIT_DEFAULT=100
      - CONSOLIDATION_ENABLED=true
      - RECONSOLIDATION_ENABLED=true
      - GRAPH_RECALL_ENABLED=true
    deploy:
      resources:
        limits:
          memory: 2G
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://localhost:3100/health'').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    container_name: reka-dashboard
    ports:
      - "127.0.0.1:3001:3000"
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      rag-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  landing:
    build:
      context: ../landing
      dockerfile: Dockerfile
    container_name: reka-landing
    ports:
      - "127.0.0.1:4001:4000"
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Monitoring (profile: monitoring) ──────────────────────
  # Usage: docker compose --profile monitoring up -d

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: reka-prometheus
    profiles: ["monitoring"]
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=2GB"
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: reka-jaeger
    profiles: ["monitoring"]
    ports:
      - "127.0.0.1:16686:16686"
      - "127.0.0.1:4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.1
    container_name: reka-grafana
    profiles: ["monitoring"]
    ports:
      - "127.0.0.1:3200:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      - prometheus
    healthcheck:
      test:
        ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  api_data:
    name: reka_api_data # API keys (data/keys.json) persist across rebuilds
  qdrant_data:
    name: shared_qdrant_data
  ollama_data:
    name: shared_ollama_data
  redis_data:
    name: shared_redis_data
  prometheus_data:
    name: reka_prometheus_data
  grafana_data:
    name: reka_grafana_data

networks:
  default:
    name: reka-network
