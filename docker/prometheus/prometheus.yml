global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "rag-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["rag-api:3100"]
        labels:
          service: "rag-api"

  - job_name: "qdrant"
    metrics_path: /metrics
    static_configs:
      - targets: ["qdrant:6333"]
        labels:
          service: "qdrant"
