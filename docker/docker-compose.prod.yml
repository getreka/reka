# Production overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  rag-api:
    environment:
      - LOG_LEVEL=warn
      - NODE_ENV=production
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  qdrant:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  ollama:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  redis:
    restart: always

  dashboard:
    restart: always
