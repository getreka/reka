# Demo deployment - lightweight stack for hosted demo at getreka.dev
# Usage: docker compose -f docker-compose.yml -f docker-compose.demo.yml up -d
#
# Excludes: monitoring stack (LLM completions use the Claude API)
# Includes: qdrant, ollama (embeddings), redis, rag-api, dashboard (demo nginx)

services:
  rag-api:
    environment:
      - NODE_ENV=production
      - DEMO_MODE=true
      - DEMO_DASHBOARD_URL=https://app.getreka.dev
      - DEMO_API_URL=https://api.getreka.dev
      - CORS_ORIGIN=https://app.getreka.dev,https://getreka.dev
      - LLM_PROVIDER=anthropic
      - LOG_LEVEL=info
      - RATE_LIMIT_DEFAULT=30
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
      args:
        - NGINX_CONF=nginx.demo.conf
    ports:
      - "3001:3001"
    environment:
      - VITE_API_URL=https://api.getreka.dev
    restart: always

  qdrant:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  redis:
    restart: always

  # NOTE: ollama stays enabled — the base stack uses it for embeddings
  # (EMBEDDING_PROVIDER=ollama) and rag-api has a hard depends_on it.
  # Only LLM completions are routed to the Claude API via LLM_PROVIDER=anthropic.
  ollama:
    restart: always
