# LB-3 clean-machine verification harness.
#
# Brings up a FULLY ISOLATED Reka stack with fresh volumes (empty keystore),
# distinct container names + host ports, and reuses the host's Ollama. It does
# NOT touch the production stack from docker-compose.yml (different project name,
# container names, ports, and volumes).
#
# Purpose: prove that a brand-new user can go from zero state to a working,
# authenticated RAG following only the documented first-run path — catching
# auth / onboarding / key-minting / deny-by-default regressions before a launch.
#
# Usage (see docker/CLEANROOM.md for the full verification script):
#   docker compose -p reka-cr -f docker/docker-compose.cleanroom.yml up -d --build
#   ... run the published CLI against http://localhost:3399 / container reka-api-cr ...
#   docker compose -p reka-cr -f docker/docker-compose.cleanroom.yml down -v
#
# Prerequisite: the host's Ollama must be running with the embedding model
# (qwen3-embedding:4b). Override OLLAMA_URL below if yours is elsewhere.
services:
  qdrant-cr:
    image: qdrant/qdrant:v1.15.2
    container_name: reka-qdrant-cr
    ports:
      - "127.0.0.1:6399:6333"
    volumes:
      - qdrant_cr:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis-cr:
    image: redis:7-alpine
    container_name: reka-redis-cr
    command: redis-server --appendonly no --maxmemory 512mb --maxmemory-policy noeviction
    volumes:
      - redis_cr:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rag-api-cr:
    build:
      context: ../rag-api
      dockerfile: Dockerfile
    container_name: reka-api-cr
    ports:
      - "127.0.0.1:3399:3100"
    volumes:
      - api_cr:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - QDRANT_URL=http://qdrant-cr:6333
      - OLLAMA_URL=http://host.docker.internal:11434
      - REDIS_URL=redis://redis-cr:6379
      - EMBEDDING_PROVIDER=ollama
      - OLLAMA_EMBEDDING_MODEL=qwen3-embedding:4b
      - VECTOR_SIZE=2560
      - RERANKER_ENABLED=false
      - LLM_PROVIDER=ollama
      - OLLAMA_MODEL=qwen3.5:9b
      - API_PORT=3100
      - API_HOST=0.0.0.0
      - NODE_OPTIONS=--max-old-space-size=2048
      - CONSOLIDATION_ENABLED=true
    depends_on:
      qdrant-cr:
        condition: service_healthy
      redis-cr:
        condition: service_healthy

volumes:
  qdrant_cr:
  redis_cr:
  api_cr:
