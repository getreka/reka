# Reka Platform — root compose shim.
#
# The CANONICAL stack lives in docker/docker-compose.yml (containers reka-*).
# This file only exists so `docker compose up -d` from the repo root keeps working.
# Requires Docker Compose v2.20+ (for `include:`).
#
# MIGRATION NOTE (old root-level `shared-*` stack users):
#   The legacy services defined here (shared-rag-api, shared-dashboard, shared-bge-m3,
#   shared-qdrant, shared-ollama, shared-redis) are gone. Stop them first:
#     docker rm -f shared-rag-api shared-dashboard shared-bge-m3 shared-qdrant shared-ollama shared-redis
#   then run `docker compose up -d` to boot the reka-* stack. The data volumes
#   (shared_qdrant_data, shared_ollama_data, shared_redis_data) are reused as-is.
#   The bge-m3 container is no longer part of the default stack — embeddings now
#   come from Ollama (qwen3-embedding:4b).

include:
  - docker/docker-compose.yml
